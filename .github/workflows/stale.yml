name: stale

on:
  schedule:
    - cron: "21 4 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: "This issue has been inactive for 60 days and will be closed in 7 days without activity."
          stale-pr-message: "This PR has been inactive for 30 days and will be closed in 7 days without activity."
          close-issue-message: "Closing due to inactivity. Reopen if this is still relevant."
          close-pr-message: "Closing due to inactivity. Reopen when ready."
          days-before-issue-stale: 60
          days-before-issue-close: 7
          days-before-pr-stale: 30
          days-before-pr-close: 7
          exempt-issue-labels: "security,blocked"
          exempt-pr-labels: "security,blocked"
