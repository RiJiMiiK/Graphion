name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

  sanitize-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Configure with sanitizers
        run: cmake -S . -B build-sanitize -DGRAPHION_ENABLE_SANITIZERS=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-sanitize --config Debug

      - name: Cppcheck
        run: cppcheck --enable=warning,style,performance,portability --error-exitcode=1 --inline-suppr src
