name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            build_type: Debug
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            build_type: Debug
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            build_type: Release
          - os: windows-latest
            compiler: msvc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Clang
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Configure (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}

      - name: Assembly safety policy
        run: python scripts/check_asm_safety.py

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang clang-tidy ninja-build
      - name: Configure
        run: cmake -S . -B build-tidy -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: python scripts/run_clang_tidy.py --build-dir build-tidy

  sanitize-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Configure with sanitizers
        run: cmake -S . -B build-sanitize -DGRAPHION_ENABLE_SANITIZERS=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-sanitize --config Debug

      - name: Test
        run: ctest --test-dir build-sanitize --output-on-failure -C Debug

      - name: Cppcheck
        run: cppcheck --enable=warning,style,performance,portability --error-exitcode=1 --inline-suppr src

      - name: Assembly safety policy
        run: python scripts/check_asm_safety.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build dev container image
        run: docker build -t graphion-dev:ci .

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Configure
        run: cmake -S . -B build-bench -G Ninja -DGRAPHION_ENABLE_BENCHMARKS=ON
      - name: Build
        run: cmake --build build-bench
      - name: Run benchmark smoke
        run: python scripts/run_bench.py --build-dir build-bench --iterations 10000
      - name: Compare benchmark vs baseline
        run: python scripts/compare_bench.py --baseline benchmarks/baselines/vm_dispatch.json --current benchmarks/results/latest.json --max-regression 0.50
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: bench-latest
          path: benchmarks/results/latest.json
          retention-days: 30
