name: coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y lcov ninja-build
      - name: Configure with coverage flags
        run: |
          cmake -S . -B build-cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
      - name: Build
        run: cmake --build build-cov
      - name: Test
        run: ctest --test-dir build-cov --output-on-failure
      - name: Capture coverage
        run: |
          lcov --capture --directory build-cov --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/tests/*' --ignore-errors unused --output-file coverage.filtered.info
          lcov --summary coverage.filtered.info
      - name: Generate html
        run: genhtml coverage.filtered.info --output-directory coverage-html
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 30
