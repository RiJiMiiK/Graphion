name: spellcheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          config: .cspell.json
          files: |
            README.md
            CONTRIBUTING.md
            SECURITY.md
            SUPPORT.md
            CHANGELOG.md
            docs/**/*.md
            .github/**/*.md
