name: actions-pinning-audit

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/audit_actions_pinning.py"
  schedule:
    - cron: "53 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run action pinning audit (report mode)
        run: |
          python scripts/audit_actions_pinning.py || true
